name: "Continuous Integration - Pull Request"
on:
  push:
    branches:
      - otel_instrumented
    paths-ignore:
      - '**/README.md'
      - 'kustomize/**'
      - '.github/workflows/kustomize-build-ci.yaml'
      - 'terraform/**'
      - '.github/workflows/terraform-validate-ci.yaml'
      - 'helm-chart/**'
      - '.github/workflows/helm-chart-ci.yaml'

jobs:
  code-tests:
    runs-on: ubuntu-latest
    env:
      CI_SERVICE_NAMESPACE: "online-boutique"
      CI_SERVICE_NAME: "online-boutique"
      CI_JOB_TARGET: "unit-tests"
      OTLP_AUTH_TOKEN: ${{ secrets.OTLP_AUTH_TOKEN }}
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0'

    - uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Setup OTel
      run: bash ci-instrumentation/ci-setup.sh

    - name: Test shippingservice
      if: "!cancelled()"
      timeout-minutes: 10
      run: |
        python3 ci-instrumentation/ciwrap.py \
          --name "Test shippingservice" \
          --task-target "shippingservice" \
          --junit artifacts/test-results/shippingservice.xml \
          -- bash -c "cd src/shippingservice && gotestsum --junitfile $CI_WORKSPACE/artifacts/test-results/shippingservice.xml ./..."

    - name: Test productcatalogservice
      if: "!cancelled()"
      timeout-minutes: 10
      run: |
        python3 ci-instrumentation/ciwrap.py \
          --name "Test productcatalogservice" \
          --task-target "productcatalogservice" \
          --junit artifacts/test-results/productcatalogservice.xml \
          -- bash -c "cd src/productcatalogservice && gotestsum --junitfile $CI_WORKSPACE/artifacts/test-results/productcatalogservice.xml ./..."

    - name: Test frontend/validator
      if: "!cancelled()"
      timeout-minutes: 10
      run: |
        python3 ci-instrumentation/ciwrap.py \
          --name "Test frontend/validator" \
          --task-target "frontend" \
          --junit artifacts/test-results/frontend-validator.xml \
          -- bash -c "cd src/frontend/validator && gotestsum --junitfile $CI_WORKSPACE/artifacts/test-results/frontend-validator.xml ./..."

    - name: Test cartservice
      if: "!cancelled()"
      timeout-minutes: 10
      run: |
        python3 ci-instrumentation/ciwrap.py \
          --name "Test cartservice" \
          --task-target "cartservice" \
          -- dotnet test src/cartservice/

    - name: Teardown OTel
      if: always()
      run: bash ci-instrumentation/ci-teardown.sh

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: otel-data-online-boutique
        path: |
          artifacts/otel/otel-logs.json
          artifacts/otel/otel-metrics.json
          artifacts/otel/otel-traces.json
          artifacts/otel/otelcol.log
          artifacts/test-results/
        retention-days: 30
